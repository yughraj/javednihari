<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Javed Nihari</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400..700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0604; --surface: #1c1007;
  --gold: #d4a04f; --saffron: #e8893c;
  --cream: #faf4e6; --text: #f4e9d4;
  --text-soft: #b8a585; --text-muted: #7a6a4f;
  --border: rgba(212, 160, 79, 0.15);
  --green: #4ade80; --red: #f87171; --blue: #60a5fa;
}
body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; font-weight: 300; min-height: 100vh; -webkit-font-smoothing: antialiased; }
a { color: var(--gold); text-decoration: none; }

.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.login-screen.hidden { display: none; }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 3rem 2.5rem; max-width: 420px; width: 100%; text-align: center; }
.login-logo { width: 60px; height: 60px; background: linear-gradient(135deg, var(--gold), var(--saffron)); border-radius: 50%; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-style: italic; font-weight: 700; color: var(--bg); }
.login-box h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 500; color: var(--cream); margin-bottom: 0.5rem; }
.login-box h1 em { color: var(--gold); font-style: italic; }
.login-box .sub { color: var(--text-soft); margin-bottom: 2rem; font-size: 0.9rem; }
.login-box input { width: 100%; background: rgba(10, 6, 4, 0.6); border: 1px solid var(--border); border-radius: 10px; padding: 0.85rem 1rem; color: var(--cream); font-family: 'Manrope', sans-serif; font-size: 0.95rem; margin-bottom: 1rem; }
.login-box input:focus { outline: none; border-color: var(--gold); }
.login-box button { width: 100%; background: linear-gradient(135deg, var(--gold), var(--saffron)); color: var(--bg); border: none; padding: 1rem; border-radius: 100px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; font-size: 0.85rem; cursor: pointer; }
.login-error { color: var(--red); font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2rem; }

.dashboard { display: none; }
.dashboard.active { display: block; }
.admin-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.25rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
.admin-brand { display: flex; align-items: center; gap: 0.75rem; }
.admin-brand .logo-mark { width: 36px; height: 36px; background: linear-gradient(135deg, var(--gold), var(--saffron)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; font-weight: 700; color: var(--bg); }
.admin-brand h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 500; }
.admin-brand h2 em { color: var(--gold); font-style: italic; }
.admin-brand .label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.15em; }
.live-indicator { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--green); font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-left: 0.75rem; }
.live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.logout-btn { background: transparent; border: 1px solid var(--border); color: var(--text-soft); padding: 0.6rem 1.2rem; border-radius: 100px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
.logout-btn:hover { border-color: var(--red); color: var(--red); }
.container { max-width: 1280px; margin: 0 auto; padding: 2rem; }

.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; margin-bottom: 2rem; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
.stat-card .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.5rem; }
.stat-card .value { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 500; color: var(--gold); line-height: 1; }
.stat-card .sub { font-size: 0.75rem; color: var(--text-soft); margin-top: 0.25rem; }

.filters { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
.filter-btn { padding: 0.6rem 1.2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; color: var(--text-soft); font-size: 0.8rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.filter-btn.active { background: linear-gradient(135deg, var(--gold), var(--saffron)); color: var(--bg); border-color: var(--gold); }
.filter-btn .count { background: rgba(0,0,0,0.2); padding: 0.1rem 0.5rem; border-radius: 100px; margin-left: 0.4rem; font-size: 0.7rem; }
.search-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.search-row input { flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 0.75rem 1.5rem; color: var(--cream); font-family: 'Manrope', sans-serif; }
.search-row input:focus { outline: none; border-color: var(--gold); }

.orders-list { display: flex; flex-direction: column; gap: 1rem; }
.order-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; transition: border-color 0.2s; }
.order-card:hover { border-color: rgba(212, 160, 79, 0.4); }
.order-card.new-pulse { animation: newOrder 2s ease; }
@keyframes newOrder { 0% { border-color: var(--green); box-shadow: 0 0 30px rgba(74, 222, 128, 0.3); } 100% { border-color: var(--border); box-shadow: none; } }

.order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.75rem; }
.order-meta { display: flex; flex-direction: column; gap: 0.3rem; }
.order-no { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--gold); font-style: italic; font-weight: 500; }
.order-customer { color: var(--cream); font-weight: 500; font-size: 1rem; }
.order-time { font-size: 0.78rem; color: var(--text-muted); }
.status-badge { padding: 0.4rem 1rem; border-radius: 100px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
.status-pending { background: rgba(96, 165, 250, 0.15); color: var(--blue); border: 1px solid rgba(96, 165, 250, 0.3); }
.status-preparing { background: rgba(232, 137, 60, 0.15); color: var(--saffron); border: 1px solid rgba(232, 137, 60, 0.3); }
.status-delivering { background: rgba(212, 160, 79, 0.15); color: var(--gold); border: 1px solid rgba(212, 160, 79, 0.3); }
.status-delivered { background: rgba(74, 222, 128, 0.15); color: var(--green); border: 1px solid rgba(74, 222, 128, 0.3); }
.status-cancelled { background: rgba(248, 113, 113, 0.15); color: var(--red); border: 1px solid rgba(248, 113, 113, 0.3); }
.order-body { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; padding: 1rem 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.order-section .label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.4rem; }
.order-section .value { font-size: 0.9rem; color: var(--text); line-height: 1.5; }
.order-items-list { font-size: 0.88rem; color: var(--text-soft); }
.order-items-list div { padding: 0.25rem 0; }
.order-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; flex-wrap: wrap; gap: 1rem; }
.order-total { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--gold); font-style: italic; font-weight: 500; }
.order-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.action-btn { padding: 0.5rem 1rem; background: rgba(212, 160, 79, 0.1); border: 1px solid var(--border); color: var(--text-soft); border-radius: 100px; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.action-btn:hover { border-color: var(--gold); color: var(--gold); }
.action-btn.wa { background: rgba(37, 211, 102, 0.1); border-color: rgba(37, 211, 102, 0.3); color: #25d366; }
.action-btn.wa:hover { background: rgba(37, 211, 102, 0.2); }
.action-btn.cancel:hover { border-color: var(--red); color: var(--red); }
.empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-soft); }
.empty-state .icon { font-size: 3.5rem; opacity: 0.3; margin-bottom: 1rem; }
.empty-state h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: var(--cream); margin-bottom: 0.5rem; }

@media (max-width: 768px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .order-body { grid-template-columns: 1fr; }
  .container { padding: 1rem; }
  .admin-header { padding: 1rem; }
}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">J</div>
    <h1>Javed <em>Nihari</em></h1>
    <p class="sub">Admin Dashboard</p>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required autocomplete="username">
      <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
      <button type="submit" id="loginBtn">Sign In</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <header class="admin-header">
    <div class="admin-brand">
      <div class="logo-mark">J</div>
      <div>
        <h2>Javed <em>Nihari</em></h2>
        <div class="label">Admin Dashboard<span class="live-indicator"><span class="live-dot"></span>Live</span></div>
      </div>
    </div>
    <button class="logout-btn" id="logoutBtn">Sign Out</button>
  </header>
  <div class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Today's Orders</div>
        <div class="value" id="statToday">0</div>
        <div class="sub">Since 12 AM</div>
      </div>
      <div class="stat-card">
        <div class="label">Today's Revenue</div>
        <div class="value" id="statRevenue">Rs. 0</div>
        <div class="sub">All orders today</div>
      </div>
      <div class="stat-card">
        <div class="label">Pending</div>
        <div class="value" id="statPending">0</div>
        <div class="sub">Need attention</div>
      </div>
      <div class="stat-card">
        <div class="label">Total Orders</div>
        <div class="value" id="statTotal">0</div>
        <div class="sub">All time</div>
      </div>
    </div>
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Search by name, phone, or order number...">
    </div>
    <div class="filters">
      <button class="filter-btn active" data-status="all">All <span class="count" id="cAll">0</span></button>
      <button class="filter-btn" data-status="pending">Pending <span class="count" id="cPending">0</span></button>
      <button class="filter-btn" data-status="preparing">Preparing <span class="count" id="cPreparing">0</span></button>
      <button class="filter-btn" data-status="delivering">Out for Delivery <span class="count" id="cDelivering">0</span></button>
      <button class="filter-btn" data-status="delivered">Delivered <span class="count" id="cDelivered">0</span></button>
      <button class="filter-btn" data-status="cancelled">Cancelled <span class="count" id="cCancelled">0</span></button>
    </div>
    <div class="orders-list" id="ordersList"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5KOpoG41fAXB0IHweSlQ8-WMlzZ03oQk",
  authDomain: "javednihari.firebaseapp.com",
  projectId: "javednihari",
  storageBucket: "javednihari.firebasestorage.app",
  messagingSenderId: "15846631272",
  appId: "1:15846631272:web:f3a8a6db08436fcf5b18dd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allOrders = [];
let currentFilter = 'all';
let currentSearch = '';
let unsubscribe = null;
let previousOrderIds = new Set();

// LOGIN
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  errEl.textContent = '';
  
  try {
    await signInWithEmailAndPassword(auth, email, password);
    // onAuthStateChanged will handle showing dashboard
  } catch (err) {
    errEl.textContent = 'Invalid email or password';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});

// LOGOUT
document.getElementById('logoutBtn').addEventListener('click', async () => {
  if (unsubscribe) unsubscribe();
  await signOut(auth);
});

// AUTH STATE
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.add('active');
    startListening();
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('dashboard').classList.remove('active');
    document.getElementById('loginForm').reset();
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginBtn').textContent = 'Sign In';
  }
});

// REAL-TIME LISTEN
function startListening() {
  const q = query(collection(db, 'orders'), orderBy('createdAt', 'desc'));
  unsubscribe = onSnapshot(q, (snapshot) => {
    allOrders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    
    // Detect new orders (for animation + sound notification)
    const newIds = new Set(allOrders.map(o => o.id));
    if (previousOrderIds.size > 0) {
      const brandNew = allOrders.filter(o => !previousOrderIds.has(o.id));
      if (brandNew.length > 0) {
        notifyNewOrder();
      }
    }
    previousOrderIds = newIds;
    
    render();
  });
}

function notifyNewOrder() {
  // Browser notification
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('New Order Received', { body: 'A new order has arrived. Check the dashboard.' });
  }
  // Audio beep
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880; osc.type = 'sine';
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start(); osc.stop(ctx.currentTime + 0.5);
  } catch (e) {}
}

// Request notification permission once
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

// FILTERS
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.status;
    render();
  });
});

// SEARCH
document.getElementById('searchInput').addEventListener('input', (e) => {
  currentSearch = e.target.value.toLowerCase().trim();
  render();
});

// STATUS UPDATE
window.updateOrderStatus = async (orderId, newStatus) => {
  try {
    await updateDoc(doc(db, 'orders', orderId), { status: newStatus });
  } catch (err) {
    alert('Failed to update status: ' + err.message);
  }
};

window.confirmCancel = async (orderId) => {
  if (confirm('Cancel this order? This cannot be undone.')) {
    await window.updateOrderStatus(orderId, 'cancelled');
  }
};

window.whatsappCustomer = (phone, orderNo) => {
  const clean = phone.replace(/[^0-9]/g, '');
  let waNum = clean;
  if (waNum.startsWith('0')) waNum = '92' + waNum.substring(1);
  else if (!waNum.startsWith('92')) waNum = '92' + waNum;
  const msg = encodeURIComponent(`Salaam! Javed Nihari regarding order ${orderNo}. `);
  window.open(`https://wa.me/${waNum}?text=${msg}`, '_blank');
};

// FORMATTING HELPERS
function formatTime(ts) {
  if (!ts) return 'Just now';
  const d = new Date(ts);
  const now = new Date();
  const diffMin = Math.floor((now - d) / 60000);
  if (diffMin < 1) return 'Just now';
  if (diffMin < 60) return diffMin + ' min ago';
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return diffHr + ' hr ago';
  return d.toLocaleDateString('en-PK', { day: 'numeric', month: 'short' }) + ' · ' + d.toLocaleTimeString('en-PK', { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// RENDER
function render() {
  // Stats
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const todaysOrders = allOrders.filter(o => new Date(o.createdAt) >= today);
  const todayRevenue = todaysOrders.reduce((s, o) => s + (o.total || 0), 0);
  
  document.getElementById('statToday').textContent = todaysOrders.length;
  document.getElementById('statRevenue').textContent = 'Rs. ' + todayRevenue.toLocaleString();
  document.getElementById('statPending').textContent = allOrders.filter(o => o.status === 'pending').length;
  document.getElementById('statTotal').textContent = allOrders.length;
  
  const counts = {
    all: allOrders.length,
    pending: allOrders.filter(o => o.status === 'pending').length,
    preparing: allOrders.filter(o => o.status === 'preparing').length,
    delivering: allOrders.filter(o => o.status === 'delivering').length,
    delivered: allOrders.filter(o => o.status === 'delivered').length,
    cancelled: allOrders.filter(o => o.status === 'cancelled').length,
  };
  document.getElementById('cAll').textContent = counts.all;
  document.getElementById('cPending').textContent = counts.pending;
  document.getElementById('cPreparing').textContent = counts.preparing;
  document.getElementById('cDelivering').textContent = counts.delivering;
  document.getElementById('cDelivered').textContent = counts.delivered;
  document.getElementById('cCancelled').textContent = counts.cancelled;
  
  // Filter + search
  let filtered = allOrders;
  if (currentFilter !== 'all') filtered = filtered.filter(o => o.status === currentFilter);
  if (currentSearch) {
    filtered = filtered.filter(o => 
      (o.name || '').toLowerCase().includes(currentSearch) ||
      (o.phone || '').toLowerCase().includes(currentSearch) ||
      (o.orderNo || '').toLowerCase().includes(currentSearch)
    );
  }
  
  const list = document.getElementById('ordersList');
  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon">📋</div>
        <h3>No orders ${currentFilter !== 'all' ? 'in ' + currentFilter : 'yet'}</h3>
        <p>Orders placed on the website appear here in real-time.</p>
      </div>`;
    return;
  }
  
  list.innerHTML = filtered.map(o => {
    const items = (o.items || []).map(i => 
      `<div>${i.qty}× ${escapeHtml(i.name)} <span style="color: var(--text-muted);">— Rs. ${(i.price * i.qty).toLocaleString()}</span></div>`
    ).join('');
    
    let actions = '';
    if (o.status === 'pending') actions = `
      <button class="action-btn" onclick="updateOrderStatus('${o.id}', 'preparing')">Start Preparing</button>
      <button class="action-btn cancel" onclick="confirmCancel('${o.id}')">Cancel</button>`;
    else if (o.status === 'preparing') actions = `
      <button class="action-btn" onclick="updateOrderStatus('${o.id}', '${o.orderType === 'pickup' ? 'delivered' : 'delivering'}')">${o.orderType === 'pickup' ? 'Ready for Pickup' : 'Out for Delivery'}</button>`;
    else if (o.status === 'delivering') actions = `
      <button class="action-btn" onclick="updateOrderStatus('${o.id}', 'delivered')">Mark Delivered</button>`;
    
    const locationDetails = o.orderType === 'pickup'
      ? `<strong>Pickup: ${escapeHtml(o.branch || '—')}</strong>`
      : `<strong>${escapeHtml(o.address || '')}</strong>${o.area ? '<br>' + escapeHtml(o.area) : ''}`;
    
    return `
      <div class="order-card">
        <div class="order-top">
          <div class="order-meta">
            <div class="order-no">${escapeHtml(o.orderNo)}</div>
            <div class="order-customer">${escapeHtml(o.name)} · ${escapeHtml(o.phone)}</div>
            <div class="order-time">${formatTime(o.createdAt)}</div>
          </div>
          <div class="status-badge status-${o.status}">${o.status}</div>
        </div>
        <div class="order-body">
          <div class="order-section">
            <div class="label">Items</div>
            <div class="order-items-list">${items}</div>
          </div>
          <div class="order-section">
            <div class="label">${o.orderType === 'pickup' ? 'Pickup' : 'Delivery'} Details</div>
            <div class="value">
              ${locationDetails}
              ${o.notes ? '<br><span style="color: var(--gold); font-style: italic;">Note: ' + escapeHtml(o.notes) + '</span>' : ''}
              ${o.deliveryFee ? '<br><span style="color: var(--text-muted); font-size: 0.85rem;">Delivery Fee: Rs. ' + o.deliveryFee + '</span>' : ''}
            </div>
          </div>
        </div>
        <div class="order-bottom">
          <div class="order-total">Rs. ${(o.total || 0).toLocaleString()}</div>
          <div class="order-actions">
            <button class="action-btn wa" onclick="whatsappCustomer('${escapeHtml(o.phone)}', '${escapeHtml(o.orderNo)}')">WhatsApp</button>
            ${actions}
          </div>
        </div>
      </div>`;
  }).join('');
}
</script>
